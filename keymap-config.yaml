# Keymap-drawer configuration with Tabler icons and Unicode symbols
# Usage: keymap draw -c keymap-config.yaml gen/lily58_keymap.yaml

draw_config:
  key_w: 55.0
  key_h: 40.0

  glyph_tap_size: 16
  glyph_hold_size: 10
  glyph_shifted_size: 14
  small_pad: 4.0

  glyphs:
    to_base: |
      <svg viewBox="0 0 36 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Base</text>
      </svg>
    to_extra: |
      <svg viewBox="0 0 38 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Extra</text>
      </svg>
    to_tap: |
      <svg viewBox="0 0 32 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Tap</text>
      </svg>
    to_nav: |
      <svg viewBox="0 0 32 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Nav</text>
      </svg>
    to_mouse: |
      <svg viewBox="0 0 38 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Mouse</text>
      </svg>
    to_sym: |
      <svg viewBox="0 0 32 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Sym</text>
      </svg>
    to_num: |
      <svg viewBox="0 0 32 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Num</text>
      </svg>
    to_fun: |
      <svg viewBox="0 0 32 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Fun</text>
      </svg>
    to_media: |
      <svg viewBox="0 0 38 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Media</text>
      </svg>
    to_btn: |
      <svg viewBox="0 0 32 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">Btn</text>
      </svg>
    to_wm: |
      <svg viewBox="0 0 30 16">
        <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-5.5-2.75L12 4.5l5.5 2.25L12 9.5z"/>
        <text x="22" y="12" font-size="8" fill="currentColor">WM</text>
      </svg>

parse_config:
  raw_binding_map:
    # Behaviors
    "&bootloader": $$mdi:restart$$

    # Layer switches (tap-dance double-tap guards)
    "&u_to_U_BASE": $$to_base$$
    "&u_to_U_EXTRA": $$to_extra$$
    "&u_to_U_TAP": $$to_tap$$
    "&u_to_U_NAV": $$to_nav$$
    "&u_to_U_MOUSE": $$to_mouse$$
    "&u_to_U_SYM": $$to_sym$$
    "&u_to_U_NUM": $$to_num$$
    "&u_to_U_FUN": $$to_fun$$
    "&u_to_U_MEDIA": $$to_media$$
    "&u_to_U_BUTTON": $$to_btn$$
    "&u_to_U_WM": $$to_wm$$

    # Caps word
    "&u_caps_word": $$mdi:caps-lock$$

    # Output toggle
    "&u_out_tog": $$mdi:bluetooth$$

    # Bluetooth profile select
    "&u_bt_sel_0": BT0
    "&u_bt_sel_1": BT1
    "&u_bt_sel_2": BT2
    "&u_bt_sel_3": BT3
    "&u_bt_sel_4": BT4

    # Mouse buttons
    "&mkp MB1": $$mdi:mouse$$
    "&mkp MB2": $$mdi:mouse-right-click$$
    "&mkp MB3": $$mdi:mouse-scroll-wheel$$

    # Mouse movement
    "&mmv MOVE_UP": $$mdi:arrow-up-circle-outline$$
    "&mmv MOVE_DOWN": $$mdi:arrow-down-circle-outline$$
    "&mmv MOVE_LEFT": $$mdi:arrow-left-circle-outline$$
    "&mmv MOVE_RIGHT": $$mdi:arrow-right-circle-outline$$

    # Scroll wheel
    "&msc SCRL_UP": $$mdi:pan-up$$
    "&msc SCRL_DOWN": $$mdi:pan-down$$
    "&msc SCRL_LEFT": $$mdi:pan-left$$
    "&msc SCRL_RIGHT": $$mdi:pan-right$$

  zmk_keycode_map:
    # Modifiers - Mac-style icons
    LCTRL: $$mdi:apple-keyboard-control$$
    RCTRL: R$$mdi:apple-keyboard-control$$
    LALT: $$mdi:apple-keyboard-option$$
    RALT: R$$mdi:apple-keyboard-option$$
    LGUI: $$mdi:apple-keyboard-command$$
    RGUI: R$$mdi:apple-keyboard-command$$
    LSHFT: $$mdi:apple-keyboard-shift$$
    RSHFT: R$$mdi:apple-keyboard-shift$$

    # Symbols
    COMMA: ","
    DOT: .
    SLASH: /
    SQT: "'"
    SEMI: ";"
    COLON: ":"
    GRAVE: "`"
    BSLH: "\\"
    UNDER: "_"
    MINUS: "-"
    PLUS: "+"
    EQUAL: "="
    EXCL: "!"
    AT: "@"
    HASH: "#"
    DLLR: "$"
    PRCNT: "%"
    CARET: "^"
    AMPS: "&"
    ASTRK: "*"
    LPAR: "("
    RPAR: ")"
    LBKT: "["
    RBKT: "]"
    LBRC: "{"
    RBRC: "}"
    TILDE: "~"
    PIPE: "|"

    # Numbers
    N0: "0"
    N1: "1"
    N2: "2"
    N3: "3"
    N4: "4"
    N5: "5"
    N6: "6"
    N7: "7"
    N8: "8"
    N9: "9"

    # Function Keys
    F1: F1
    F2: F2
    F3: F3
    F4: F4
    F5: F5
    F6: F6
    F7: F7
    F8: F8
    F9: F9
    F10: F10
    F11: F11
    F12: F12

    # Control Keys
    BSPC: $$mdi:backspace$$
    SPACE: $$mdi:keyboard-space$$
    DEL: $$mdi:backspace-reverse$$
    RET: $$mdi:keyboard-return$$
    TAB: $$mdi:keyboard-tab$$
    ESC: $$mdi:keyboard-esc$$
    CAPS: $$mdi:keyboard-caps$$
    INS: Ins
    HOME: Home
    END: End
    PG_UP: PgUp
    PG_DN: PgDn
    PSCRN: $$mdi:camera$$
    SLCK: ScrLk
    PAUSE_BREAK: Pause
    K_APP: Menu

    # Navigation
    LEFT: $$mdi:arrow-left$$
    RIGHT: $$mdi:arrow-right$$
    UP: $$mdi:arrow-up$$
    DOWN: $$mdi:arrow-down$$

    # Media
    C_PREV: $$mdi:skip-previous$$
    C_NEXT: $$mdi:skip-next$$
    C_VOL_DN: $$mdi:volume-low$$
    C_VOL_UP: $$mdi:volume-high$$
    C_STOP: $$mdi:stop$$
    C_PP: $$mdi:play-pause$$
    C_MUTE: $$mdi:volume-mute$$

    # Clipboard macros (from keymap definitions)
    LS(LG(Z)): $$mdi:redo$$
    LG(Z): $$mdi:undo$$
    LG(V): $$mdi:content-paste$$
    LG(C): $$mdi:content-copy$$
    LG(X): $$mdi:content-cut$$

    # Alt combos (AeroSpace WM layer - LA = Left Alt)
    LA(LBKT): ⌥[
    LA(RBKT): ⌥]
    LA(N0): ⌥0
    LA(N1): ⌥1
    LA(N2): ⌥2
    LA(N3): ⌥3
    LA(N4): ⌥4
    LA(N5): ⌥5
    LA(N6): ⌥6
    LA(N7): ⌥7
    LA(N8): ⌥8
    LA(N9): ⌥9
    LA(MINUS): ⌥-
    LA(EQUAL): ⌥=
    LA(SEMI): ⌥;
    LA(GRAVE): ⌥`
    LA(BSLH): ⌥\\
    LA(DOT): ⌥.
    LA(ESC): ⌥⎋
    LA(H): ⌥H
    LA(J): ⌥J
    LA(K): ⌥K
    LA(L): ⌥L
