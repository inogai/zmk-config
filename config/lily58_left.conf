# Layer status reporting for Keyboard Layers App Companion
# https://github.com/maatthc/zmk-feature-appcompanion

# USB HID Raw Reports (uses HID_1; ZMK core uses HID_0)
CONFIG_USB_HID_DEVICE_COUNT=2
CONFIG_ZMK_LAYER_STATUS_USB_HID=y

# BLE HID Embedded (layer number in keyboard report byte 1)
CONFIG_ZMK_LAYER_STATUS_BLE_HID=y
